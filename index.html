<!DOCTYPE html>
<html>
<head>
  <title>Agora Live - Reliable Multi‑User</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    button { margin: 5px; padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; }
    button:hover { background: #0056b3; }
    .info { background: #e9ecef; padding: 10px; border-radius: 6px; margin: 10px 0; }
    .video-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
      justify-content: flex-start;
    }
    .video-box {
      background: black;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      width: 320px;
      height: 240px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .video-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
    }
    hr { margin: 20px 0; }
    .log { background: #fff; border: 1px solid #ddd; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>

<h2>🎥 Multi‑User Video Call (Auto‑Reconnect)</h2>
<div class="info">
  <strong>Channel name:</strong> <span id="channelName">(not joined)</span><br>
  <strong>My UID:</strong> <span id="myUid">-</span><br>
  <strong>Connection state:</strong> <span id="connState">DISCONNECTED</span>
</div>

<div>
  <button onclick="startLive()">🎬 Start as Host (UID 1)</button>
  <button onclick="joinAsPublisher()">👥 Join as Audience (unique UID)</button>
  <button onclick="leaveStream()">❌ Leave Call</button>
</div>

<hr>

<div class="video-grid">
  <div class="video-box" id="local-player">
    <div class="video-label">📹 You (local)</div>
  </div>
  <div id="remote-videos" class="video-grid"></div>
</div>

<div class="log" id="logPanel"></div>

<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<script>
const APP_ID = "5a6591e3ec6b438f9095dfbf7add91ce";
const API_BASE = "https://celebstalks.pythonanywhere.com/";

let client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
let localTracks = [];
let currentChannel = null;
let currentUid = null;
let currentToken = null;
let isJoining = false;
let remoteUsers = new Map(); // uid -> { div, videoTrack, audioTrack }
let reconnectAttempts = 0;

// Helper: log to console + on‑screen panel
function addLog(msg) {
  console.log(msg);
  const logDiv = document.getElementById("logPanel");
  const p = document.createElement("div");
  p.textContent = new Date().toLocaleTimeString() + " " + msg;
  logDiv.appendChild(p);
  logDiv.scrollTop = logDiv.scrollHeight;
}

// Clear all remote videos
function clearRemoteVideos() {
  const container = document.getElementById("remote-videos");
  container.innerHTML = "";
  remoteUsers.clear();
}

function addRemoteVideo(uid) {
  const container = document.getElementById("remote-videos");
  let div = document.createElement("div");
  div.id = `remote-${uid}`;
  div.className = "video-box";
  div.innerHTML = `<div class="video-label">👤 User ${uid}</div>`;
  container.appendChild(div);
  remoteUsers.set(uid, { div, videoTrack: null, audioTrack: null });
  return div;
}

function removeRemoteVideo(uid) {
  const entry = remoteUsers.get(uid);
  if (entry && entry.div) {
    entry.div.remove();
    remoteUsers.delete(uid);
  }
}

// Monitor connection state
client.on("connection-state-change", (cur, prev, reason) => {
  addLog(`🔌 Connection state: ${prev} → ${cur} (${reason || 'no reason'})`);
  document.getElementById("connState").innerText = cur;
  if (cur === "DISCONNECTED" && currentChannel && !isJoining) {
    addLog("⚠️ Unexpected disconnect, attempting to reconnect...");
    reconnect();
  }
});

async function reconnect() {
  if (reconnectAttempts > 3) {
    addLog("❌ Max reconnection attempts reached. Please manually rejoin.");
    return;
  }
  reconnectAttempts++;
  addLog(`🔄 Reconnect attempt ${reconnectAttempts}...`);
  try {
    // Request a fresh token
    const isHost = (currentUid === 1);
    let data;
    if (isHost) {
      const res = await fetch(API_BASE + "live_stream_token/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ influencer_id: 1 })
      });
      data = await res.json();
    } else {
      const res = await fetch(API_BASE + "join_live_stream/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: currentUid, channel_name: currentChannel })
      });
      data = await res.json();
    }
    if (data.token) {
      await client.join(APP_ID, currentChannel, data.token, currentUid);
      addLog("✅ Reconnected successfully");
      reconnectAttempts = 0;
      // Republish local tracks if they exist
      if (localTracks.length) {
        await client.publish(localTracks);
      }
    } else {
      throw new Error("No token from server");
    }
  } catch (err) {
    addLog(`❌ Reconnect failed: ${err.message}`);
    setTimeout(reconnect, 5000);
  }
}

// Safely join/leave
async function safeJoin(callback) {
  if (isJoining) {
    addLog("⚠️ Already joining, please wait...");
    return;
  }
  isJoining = true;
  try {
    if (client.connectionState !== "DISCONNECTED") {
      addLog("⚠️ Leaving previous session...");
      await client.leave();
      clearRemoteVideos();
    }
    await callback();
    reconnectAttempts = 0;
  } catch (err) {
    addLog(`❌ Error: ${err.message}`);
    alert("Action failed: " + err.message);
  } finally {
    isJoining = false;
  }
}

// ------------------- Start as Host -------------------
async function startLive() {
  safeJoin(async () => {
    addLog("📡 Requesting token for host...");
    const res = await fetch(API_BASE + "live_stream_token/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ influencer_id: 1 })
    });
    const data = await res.json();
    addLog(`🎯 Host token: ${JSON.stringify(data)}`);
    if (!data.token || !data.channel_name) throw new Error("Invalid token");
    currentChannel = data.channel_name;
    currentUid = data.uid;
    currentToken = data.token;
    document.getElementById("channelName").innerText = currentChannel;
    document.getElementById("myUid").innerText = currentUid;

    await client.setClientRole("host");
    await client.join(APP_ID, currentChannel, currentToken, currentUid);
    addLog(`✅ Joined as HOST (${currentUid})`);

    const [audioTrack, videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
    localTracks = [audioTrack, videoTrack];
    videoTrack.play("local-player");
    await client.publish(localTracks);
    addLog("🎥 Published local tracks");
  });
}

// ------------------- Join as Audience -------------------
async function joinAsPublisher() {
  const channel = prompt("Enter channel name:");
  if (!channel) return;
  const uniqueUid = Math.floor(Math.random() * 9000) + 1000;
  addLog(`🔑 Using UID: ${uniqueUid}`);

  safeJoin(async () => {
    addLog(`📡 Requesting token for UID ${uniqueUid}...`);
    const res = await fetch(API_BASE + "join_live_stream/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: uniqueUid, channel_name: channel })
    });
    const data = await res.json();
    addLog(`🎯 Join response: ${JSON.stringify(data)}`);
    if (!data.token || !data.channel_name) throw new Error("Invalid response");
    currentChannel = data.channel_name;
    currentUid = data.uid;
    currentToken = data.token;
    document.getElementById("channelName").innerText = currentChannel;
    document.getElementById("myUid").innerText = currentUid;

    await client.setClientRole("host");
    await client.join(APP_ID, currentChannel, currentToken, currentUid);
    addLog(`✅ Joined as PUBLISHER (${currentUid})`);

    const [audioTrack, videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
    localTracks = [audioTrack, videoTrack];
    videoTrack.play("local-player");
    await client.publish(localTracks);
    addLog("🎥 Published my video & audio");
  });
}

// ------------------- Remote events -------------------
client.on("user-published", async (user, mediaType) => {
  addLog(`📡 Remote ${user.uid} published ${mediaType}`);
  try {
    await client.subscribe(user, mediaType);
    let entry = remoteUsers.get(user.uid);
    if (!entry && mediaType === "video") {
      addRemoteVideo(user.uid);
      entry = remoteUsers.get(user.uid);
    }
    if (mediaType === "video" && entry && entry.div) {
      user.videoTrack.play(entry.div.id);
      entry.videoTrack = user.videoTrack;
      addLog(`▶️ Playing video from ${user.uid}`);
    }
    if (mediaType === "audio") {
      user.audioTrack.play();
      if (entry) entry.audioTrack = user.audioTrack;
      addLog(`🔊 Playing audio from ${user.uid}`);
    }
  } catch (err) {
    addLog(`❌ Subscribe error: ${err.message}`);
  }
});

client.on("user-unpublished", (user, mediaType) => {
  addLog(`🔇 Remote ${user.uid} unpublished ${mediaType}`);
  if (mediaType === "video") {
    const entry = remoteUsers.get(user.uid);
    if (entry && entry.videoTrack) entry.videoTrack.stop();
    removeRemoteVideo(user.uid);
  }
});

client.on("user-left", (user) => {
  addLog(`🚪 Remote ${user.uid} left`);
  removeRemoteVideo(user.uid);
});

client.on("user-joined", (user) => {
  addLog(`👋 New user joined: ${user.uid}`);
});

// ------------------- Leave -------------------
async function leaveStream() {
  try {
    addLog("🛑 Leaving...");
    if (localTracks.length) {
      localTracks.forEach(t => { t.stop(); t.close(); });
      localTracks = [];
    }
    if (client.connectionState !== "DISCONNECTED") await client.leave();
    clearRemoteVideos();
    const localDiv = document.getElementById("local-player");
    const oldVideo = localDiv.querySelector("video");
    if (oldVideo) oldVideo.remove();
    currentChannel = null;
    currentUid = null;
    document.getElementById("channelName").innerText = "(not joined)";
    document.getElementById("myUid").innerText = "-";
    addLog("✅ Left");
  } catch (err) {
    addLog(`❌ Leave error: ${err.message}`);
  }
}

window.addEventListener("beforeunload", () => {
  if (localTracks.length) localTracks.forEach(t => t.close());
  if (client && client.connectionState !== "DISCONNECTED") client.leave();
});
</script>
</body>
</html>
